<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Yoddha</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    
    <style>
        :root { --primary: #0088cc; --bg: #000; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        
        #player-container { width: 95%; max-width: 1000px; }
        #plyr-player { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 10px; }
        
        .btn-join { 
            display: block; width: 220px; margin: 20px auto; padding: 12px;
            background: var(--primary); color: #fff; text-align: center; border-radius: 8px; 
            text-decoration: none; font-weight: bold; cursor: pointer; border: none;
        }

        /* Popup Styles */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; color: white; width: 85%; max-width: 350px; border: 1px solid #333; }
        .modal h2 { color: var(--primary); margin-top: 0; }
        .modal button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 14px; }
        #joinBtn { background: var(--primary); color: white; width: 100%; }
        #closeBtn { background: transparent; color: #aaa; text-decoration: underline; margin-top: 10px; }
    </style>
</head>
<body>

<div id="player-container">
    <video id="plyr-player" controls playsinline></video>
    <a href="https://t.me/+WU7Ei37dxuJkODk1" target="_blank" class="btn-join">Join Telegram Channel</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

<script>
    const video = document.getElementById('plyr-player');
    const videoSrc = new URLSearchParams(window.location.search).get('url');

    if (videoSrc) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                const availableQualities = hls.levels.map(l => l.height).sort((a, b) => b - a);
                
                const player = new Plyr(video, {
                    autoplay: true,
                    muted: false,
                    settings: ['quality', 'speed', 'loop'],
                    quality: {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (q) => hls.levels.forEach((l, i) => { if (l.height === q) hls.currentLevel = i; })
                    }
                });
            });
        } else {
            video.src = videoSrc;
            new Plyr(video);
        }
    }

    // Popup Logic
    window.addEventListener("load", () => {
        const overlay = document.createElement('div');
        overlay.id = 'overlay';
        overlay.innerHTML = `
            <div class="modal">
                <h2>Cricket Yoddha</h2>
                <p>Want to watch live matches without interruptions? Join our official Telegram channel for daily live links and updates!</p>
                <button id="joinBtn">Join Telegram Now</button>
                <br>
                <button id="closeBtn">Maybe Later</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('joinBtn').onclick = () => window.open("https://t.me/+WU7Ei37dxuJkODk1", "_blank");
        document.getElementById('closeBtn').onclick = () => overlay.remove();
    });
</script>

</body>
</html>
