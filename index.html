<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Yoddha | Live Stream</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .wrapper { width: 100%; max-width: 900px; margin: 20px auto; }
        .player-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; }
        
        /* Premium Popup */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal { background: #161616; padding: 35px; border-radius: 24px; width: 85%; max-width: 340px; text-align: center; border: 1px solid #333; }
        .modal h2 { margin: 0 0 15px; color: #0088cc; font-size: 22px; }
        .modal p { font-size: 15px; color: #ccc; margin-bottom: 25px; line-height: 1.6; }
        
        .btn-join { background: #0088cc; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; display: block; margin-bottom: 12px; }
        .btn-already { background: transparent; color: #666; border: 1px solid #444; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="player-wrapper">
        <video id="player" controls playsinline></video>
    </div>
</div>

<div id="overlay">
    <div class="modal">
        <h2>Join Cricket Yoddha</h2>
        <p>To watch uninterrupted live streams, please join our official Telegram channel for latest match links and real-time updates.</p>
        <button id="btnJoin" class="btn-join">Join Telegram Now</button>
        <button id="btnAlready" class="btn-already">I Have Already Joined</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

<script>
    const video = document.getElementById('player');
    const source = new URLSearchParams(window.location.search).get('url');

    // Fast Load Player
    if (source) {
        if (Hls.isSupported()) {
            const hls = new Hls({ lowLatencyMode: true });
            hls.loadSource(source);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                const qualities = hls.levels.map(l => l.height);
                new Plyr(video, {
                    settings: ['quality', 'speed'],
                    quality: { default: qualities[0], options: qualities, forced: true, onChange: (q) => hls.levels.forEach((l,i) => { if(l.height===q) hls.currentLevel=i; }) }
                });
            });
        }
    }

    // Popup Logic: 5 Seconds Delay
    window.addEventListener("load", () => {
        setTimeout(() => { document.getElementById('overlay').style.display = 'flex'; }, 5000);
    });

    document.getElementById('btnJoin').onclick = () => window.open("https://t.me/+WU7Ei37dxuJkODk1", "_blank");
    document.getElementById('btnAlready').onclick = () => { document.getElementById('overlay').style.display = 'none'; };
</script>

</body>
</html>
